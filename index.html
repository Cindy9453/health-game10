<!DOCTYPE html>

<head>

<title>健康知識格鬥遊戲（完整題庫版）</title>
<style>
body { margin:0; background:#000; color:white; font-family:sans-serif; overflow:hidden; }
#ui { position:absolute; top:10px; width:100%; display:flex; justify-content:space-between; padding:0 20px; }
.bar { width:40%; height:22px; background:#333; border:2px solid #777; }
.hp { height:100%; transition:width .2s; }
#heroBar .hp { background:linear-gradient(90deg,#00ff88,#00cc66); }
#monsterBar .hp { background:linear-gradient(90deg,#ff4444,#cc0000); }
#arena { position:absolute; bottom:80px; width:100%; height:65%; display:flex; justify-content:space-between; align-items:flex-end; padding:0 60px; }
.character { width:240px; height:340px; image-rendering:pixelated; }
/* 使用公開像素角色（可自行替換連結） */
#hero { background:url('https://opengameart.org/sites/default/files/Green-Cap-Character-16x18.png') no-repeat center/contain; }
#monster { background:url('https://opengameart.org/sites/default/files/Red-Demon-16x18.png') no-repeat center/contain; transform:scaleX(-1); }
#questionBox { position:absolute; bottom:0; width:100%; background:#111; padding:12px; text-align:center; box-shadow:0 -4px 10px rgba(0,0,0,.6); }
#question { margin:6px 0 10px; font-size:18px; }
button { margin:6px; padding:10px 16px; border:none; border-radius:6px; cursor:pointer; }
button:hover{ filter:brightness(1.1);} 
</style>
</head>

</div>

<div id="arena">
  <div id="hero" class="character"></div>
  <div id="monster" class="character"></div>

<div id="questionBox">
  <h3 id="question"></h3>
  <div id="choices"></div>

// ===== 遊戲邏輯 =====
function getQ(){
  if(used.size===questions.length){ alert('全破！'); location.reload(); }
  let i; do{ i=Math.floor(Math.random()*questions.length);} while(used.has(i));
  used.add(i); return questions[i];
}

function updateHP(){
  document.querySelector('#heroBar .hp').style.width = heroHP+'%';
  document.querySelector('#monsterBar .hp').style.width = monsterHP+'%';
}

function shake(el,dx){ el.style.transform=`translateX(${dx}px)`; setTimeout(()=>el.style.transform='',120); }

function attackHero(){ heroHP = Math.max(0, heroHP-10); shake(document.getElementById('hero'), 25); document.getElementById('hurt').play(); }
function attackMonster(){ monsterHP = Math.max(0, monsterHP-10); shake(document.getElementById('monster'), -25); document.getElementById('hit').play(); }

function loadQ(){
  const q = getQ();
  document.getElementById('question').innerText = q.q;
  const cdiv = document.getElementById('choices');
  cdiv.innerHTML='';
  q.a.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.innerText=opt;
    b.onclick=()=>{
      if(i===q.c){ attackMonster(); } else { attackHero(); }
      updateHP(); check(); loadQ();
    };
    cdiv.appendChild(b);
  });
}

function check(){
  if(heroHP<=0){ alert('你輸了'); location.reload(); }
  if(monsterHP<=0){ alert('你贏了'); location.reload(); }
}

updateHP();
loadQ();
</script>

</body>
</html>
